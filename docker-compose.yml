version: '3.8'

services:
  oracle-xe:
    image: gvenzl/oracle-xe:18.4.0
    container_name: oracle-xe
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: Oracle18
      ORACLE_CHARACTERSET: AL32UTF8
    ports:
      - "1521:1521"
      - "5500:5500"
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle-init:/opt/oracle/scripts/setup
      - ./TABLE_CREATION_SCRIPTS.sql:/opt/oracle/scripts/setup/TABLE_CREATION_SCRIPTS.sql

volumes:
  oracle-data:
version: '3.8'
services:
  oracle-xe:
    image: gvenzl/oracle-xe:18.4.0-slim
    container_name: oracle-xe
    environment:
      - ORACLE_PASSWORD=OraclePwd123
      - ORACLE_CHARACTERSET=AL32UTF8
    ports:
      - "1521:1521"
    volumes:
      - ./oracle-init:/opt/oracle/scripts/setup:ro
      - oracle-data:/opt/oracle/oradata
    restart: unless-stopped

volumes:
  oracle-data:
